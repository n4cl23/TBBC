name: Preview Migration Recovery

on:
  workflow_dispatch:
  push:
    branches: [codex/postgres-cms-persistence]

concurrency:
  group: preview-migration-recovery
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  recover:
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: preview
    env:
      GITHUB_ENVIRONMENT: preview
      NEON_BRANCH_NAME: ${{ vars.NEON_BRANCH_NAME }}
      NEON_BRANCH_ID: ${{ vars.NEON_BRANCH_ID }}
      PREVIEW_DATABASE_URL: ${{ secrets.PREVIEW_DATABASE_URL }}
      PREVIEW_DATABASE_URL_UNPOOLED: ${{ secrets.PREVIEW_DATABASE_URL_UNPOOLED }}
      PREVIEW_POSTGRES_URL: ${{ secrets.PREVIEW_POSTGRES_URL }}
      PREVIEW_ADMIN_USER: ${{ secrets.PREVIEW_ADMIN_USER }}
      PREVIEW_ADMIN_PASSWORD: ${{ secrets.PREVIEW_ADMIN_PASSWORD }}
      DATABASE_URL: ${{ secrets.PREVIEW_DATABASE_URL_UNPOOLED }}
      DATABASE_URL_UNPOOLED: ${{ secrets.PREVIEW_DATABASE_URL_UNPOOLED }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Preview pre-flight and Production guard
        run: node scripts/preview-preflight.mjs
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Re-audit and rollback exact partial state
        run: |
          node scripts/recover-preview-migration.mjs | tee /tmp/preview-recovery.log
          if grep -q 'PREVIEW_ROLLBACK=ALREADY_NEUTRALIZED' /tmp/preview-recovery.log; then
            echo 'PREVIEW_RECOVERY_ALREADY_NEUTRALIZED=1' >> "$GITHUB_ENV"
          fi
      - name: Mark audited execution rolled back
        run: |
          if [ "${PREVIEW_RECOVERY_ALREADY_NEUTRALIZED:-}" = '1' ]; then
            echo 'PRISMA_MIGRATE_RESOLVE=ALREADY_RECORDED'
            exit 0
          fi
          if ! npx prisma migrate resolve --rolled-back 20260717000000_postgres_cms_foundation > /tmp/migrate-resolve.log 2>&1; then
            sed -E 's#postgres(ql)?://[^[:space:]]+#[REDACTED]#g; s#at "[^"]+"#at "[REDACTED_ENDPOINT]"#g' /tmp/migrate-resolve.log
            exit 1
          fi
          echo 'PRISMA_MIGRATE_RESOLVE=PASSED'
      - name: Deploy versioned recovery and foundation migrations
        run: |
          started=$(date +%s)
          if ! npx prisma migrate deploy > /tmp/migrate-deploy.log 2>&1; then
            sed -E 's#postgres(ql)?://[^[:space:]]+#[REDACTED]#g; s#at "[^"]+"#at "[REDACTED_ENDPOINT]"#g' /tmp/migrate-deploy.log
            exit 1
          fi
          sed -E 's#postgres(ql)?://[^[:space:]]+#[REDACTED]#g; s#at "[^"]+"#at "[REDACTED_ENDPOINT]"#g' /tmp/migrate-deploy.log
          echo "MIGRATION_DURATION_SECONDS=$(($(date +%s)-started))"
      - run: npx prisma validate
      - name: Confirm migration status
        run: |
          if ! npx prisma migrate status > /tmp/migrate-status.log 2>&1; then
            sed -E 's#postgres(ql)?://[^[:space:]]+#[REDACTED]#g; s#at "[^"]+"#at "[REDACTED_ENDPOINT]"#g' /tmp/migrate-status.log
            exit 1
          fi
          sed -E 's#postgres(ql)?://[^[:space:]]+#[REDACTED]#g; s#at "[^"]+"#at "[REDACTED_ENDPOINT]"#g' /tmp/migrate-status.log
      - name: Confirm idempotent deploy
        run: |
          if ! npx prisma migrate deploy > /tmp/migrate-idempotent.log 2>&1; then
            sed -E 's#postgres(ql)?://[^[:space:]]+#[REDACTED]#g; s#at "[^"]+"#at "[REDACTED_ENDPOINT]"#g' /tmp/migrate-idempotent.log
            exit 1
          fi
          echo 'PRISMA_MIGRATE_IDEMPOTENT=PASSED'
      - name: Confirm Prisma schema alignment
        run: |
          if ! npx prisma migrate diff --from-config-datasource --to-schema prisma/schema.prisma --exit-code > /tmp/migrate-diff.log 2>&1; then
            sed -E 's#postgres(ql)?://[^[:space:]]+#[REDACTED]#g; s#at "[^"]+"#at "[REDACTED_ENDPOINT]"#g' /tmp/migrate-diff.log
            exit 1
          fi
          echo 'PRISMA_MIGRATE_DIFF=PASSED'
      - name: Create read-only recovery evidence
        run: node scripts/verify-preview-recovery.mjs
      - name: Upload sanitized recovery evidence
        uses: actions/upload-artifact@v4
        with:
          name: preview-migration-recovery-evidence
          path: reports/preview-migration-recovery-result.md
          if-no-files-found: error
      - name: Sanitized recovery summary
        if: always()
        run: |
          echo '### Preview migration recovery' >> "$GITHUB_STEP_SUMMARY"
          echo '- Environment: preview' >> "$GITHUB_STEP_SUMMARY"
          echo '- Production: not accessed' >> "$GITHUB_STEP_SUMMARY"
          echo '- Migration: 20260717000000_postgres_cms_foundation' >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: $GITHUB_SHA" >> "$GITHUB_STEP_SUMMARY"
