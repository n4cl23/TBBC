name: Deploy Preview

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  preview:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment: preview
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx vercel@56.2.0 pull --yes --environment=preview
      - run: npx vercel@56.2.0 env pull .env.preview.local --environment=preview --yes
      - name: Apply Preview migrations
        run: cp .env.preview.local .env && npx prisma migrate deploy
      - name: Import and verify Canon
        run: cp .env.preview.local .env && npm run db:canon:import && npm run db:canon:verify
      - run: npx vercel@56.2.0 build
      - id: deploy
        shell: bash
        run: echo "url=$(npx vercel@56.2.0 deploy --prebuilt)" >> "$GITHUB_OUTPUT"
      - name: Smoke protected Preview
        run: |
          npx vercel@56.2.0 curl /api/health --deployment "${{ steps.deploy.outputs.url }}" -- --fail
          npx vercel@56.2.0 curl /api/canon --deployment "${{ steps.deploy.outputs.url }}" -- --fail
          npx vercel@56.2.0 curl /api/graph --deployment "${{ steps.deploy.outputs.url }}" -- --fail
      - name: Publish Preview URL
        run: echo "### Preview ${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
