name: Promote Production

on:
  workflow_dispatch:
    inputs:
      preview_url:
        description: Preview validado que será promovido
        required: true
        type: string

concurrency:
  group: production
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  production:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx vercel@56.2.0 pull --yes --environment=production
      - run: npx vercel@56.2.0 env pull .env.production.local --environment=production --yes
      - name: Approved Production migration
        run: cp .env.production.local .env && npx prisma migrate deploy
      - name: Verify Production Canon
        run: cp .env.production.local .env && npm run db:canon:import && npm run db:canon:verify
      - name: Promote the validated artifact
        run: npx vercel@56.2.0 promote "${{ inputs.preview_url }}" --yes
      - name: Production smoke test
        env:
          SMOKE_BASE_URL: https://theblackbanner.vercel.app
          ADMIN_USER: ${{ secrets.ADMIN_USER }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: npm run smoke
