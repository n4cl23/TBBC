name: Quality Gates

on:
  push:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npx prisma validate
      - run: npm run build
        env:
          ADMIN_USER: ci-admin
          ADMIN_PASSWORD: ci-only-placeholder
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
